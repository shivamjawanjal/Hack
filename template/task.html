<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusBuddy · study focus · task session</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f0ea;
            color: #111;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ----- NAVIGATION (consistent) ----- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2.5rem;
            background: #ffffff;
            border-bottom: 4px solid #111;
            flex-wrap: wrap;
            box-shadow: 0 8px 0 #111;
            margin-bottom: 0.8rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-decoration: none;
            color: #111;
        }

        .nav-links {
            display: flex;
            gap: 2.2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #111;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.3rem 0;
            border-bottom: 3px solid transparent;
        }

        .nav-links a:hover {
            border-bottom-color: #111;
        }

        .nav-links .active {
            border-bottom-color: #111;
        }

        .btn-nav {
            background: #111;
            color: #fff !important;
            padding: 0.6rem 2rem !important;
            border-radius: 50px;
            border: 2px solid #111;
        }

        .btn-nav:hover {
            background: transparent;
            color: #111 !important;
        }

        /* ----- PAGE HEADER (focus) ----- */
        .page-header {
            margin: 2rem 0 2rem;
        }

        .page-header h1 {
            font-size: 4.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            background: #111;
            color: #fff;
            display: inline-block;
            padding: 0.4rem 2rem 0.4rem 2rem;
            border-radius: 120px;
            border: 3px solid #111;
            box-shadow: 12px 12px 0 #888;
            margin-bottom: 1rem;
        }

        .page-desc {
            font-size: 1.5rem;
            border-left: 8px solid #111;
            padding-left: 2rem;
            color: #222;
            max-width: 800px;
        }

        /* ----- FOCUS SESSION BAR (overlapping block) ----- */
        .focus-bar {
            background: #fff;
            border: 3px solid #111;
            border-radius: 100px;
            padding: 1.8rem 2.5rem;
            box-shadow: 16px 16px 0 #111;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            align-items: center;
            margin: 3rem 0 4rem;
            transform: rotate(-0.2deg);
            transition: 0.2s;
        }

        .focus-bar:hover {
            transform: rotate(0deg) translate(-4px, -4px);
            box-shadow: 22px 22px 0 #111;
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 4px;
            background: #111;
            color: #fff;
            padding: 0.5rem 2rem;
            border-radius: 80px;
            border: 2px solid #111;
        }

        .session-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .session-btn {
            background: #111;
            color: #fff;
            border: 3px solid #111;
            border-radius: 60px;
            padding: 1rem 2.2rem;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }

        .session-btn.outline {
            background: transparent;
            color: #111;
        }

        .session-btn:hover {
            background: #fff;
            color: #111;
        }

        .session-btn.outline:hover {
            background: #111;
            color: #fff;
        }

        /* ----- TASK CATEGORIES for FOCUS (study, breaks, deep) ----- */
        .focus-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            margin: 2rem 0 4rem;
            align-items: start;
        }

        /* overlapping cards */
        .focus-card {
            background: #fff;
            border: 3px solid #111;
            border-radius: 45px;
            padding: 2rem 1.5rem 2rem;
            box-shadow: 14px 14px 0 #111;
            transition: all 0.15s ease;
            position: relative;
            z-index: 2;
        }

        .focus-card:not(:first-child) {
            margin-left: -1.5rem;
        }

        .focus-grid:hover .focus-card {
            box-shadow: 8px 8px 0 #111;
        }

        .focus-card:hover {
            transform: scale(1.02) translateY(-8px) translateX(-8px);
            box-shadow: 24px 24px 0 #111;
            z-index: 10;
            background: #fff;
        }

        .card-header {
            font-size: 2.2rem;
            font-weight: 800;
            border-bottom: 4px solid #111;
            padding-bottom: 0.8rem;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .task-list {
            list-style: none;
            margin-bottom: 1.8rem;
            max-height: 280px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #111 #ccc;
            padding-right: 4px;
        }

        .task-list li {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.9rem 0.3rem;
            border-bottom: 1px dashed #aaa;
            font-size: 1.1rem;
        }

        .task-check {
            width: 22px;
            height: 22px;
            accent-color: #111;
            flex-shrink: 0;
            cursor: pointer;
            border: 2px solid #111;
        }

        .task-text {
            flex: 1;
            word-break: break-word;
            font-weight: 500;
        }

        .completed .task-text {
            text-decoration: line-through;
            color: #777;
        }

        .delete-task {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #aaa;
            padding: 0 4px;
            line-height: 1;
        }

        .delete-task:hover {
            color: #111;
        }

        .mini-add {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .mini-add input {
            flex: 1;
            border: 3px solid #111;
            border-radius: 40px;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            background: #fff;
        }

        .mini-add button {
            background: #111;
            color: #fff;
            border: 3px solid #111;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            font-size: 2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .mini-add button:hover {
            background: #fff;
            color: #111;
        }

        /* focus quote / tip */
        .focus-tip {
            background: #111;
            color: #fff;
            padding: 2rem 3rem;
            border-radius: 120px;
            margin: 3rem 0;
            border: 3px solid #fff;
            box-shadow: 16px 16px 0 #111;
            font-size: 1.4rem;
            font-weight: 500;
            text-align: center;
        }

        .focus-tip i {
            font-style: italic;
            color: #ddd;
        }

        /* footer */
        .footer {
            background: #111;
            color: #bbb;
            padding: 2.5rem 0;
            border-top: 5px solid #fff;
            margin-top: 4rem;
        }

        .footer .container {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .footer a {
            color: #fff;
            text-decoration: none;
        }

        @media (max-width: 1000px) {
            .focus-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .focus-card:not(:first-child) {
                margin-left: 0;
            }
        }

        @media (max-width: 700px) {
            .focus-grid {
                grid-template-columns: 1fr;
            }
            .page-header h1 {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">🧘 FocusBuddy AI</a>
        <div class="nav-links">
            <a href="#">Dashboard</a>
            <a href="#" class="active">Tasks</a>
            <a href="#">Schedule</a>
            <a href="#">Analytics</a>
            <a href="#" class="btn-nav">Logout</a>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="page-header">
                <h1>🧠 focus session</h1>
                <div class="page-desc">study · deep work · breaks — overlapping focus cards</div>
            </div>

            <!-- focus timer + controls -->
            <div class="focus-bar">
                <div class="timer-display" id="timer">25:00</div>
                <div class="session-controls">
                    <button class="session-btn" id="startFocus">▶ start focus</button>
                    <button class="session-btn outline" id="pauseFocus">⏸ pause</button>
                    <button class="session-btn outline" id="resetFocus">↺ reset</button>
                </div>
            </div>

            <!-- task categories for focus (deep work, quick review, breaks) -->
            <div class="focus-grid" id="focusGrid"></div>

            <!-- motivational tip (updates based on timer) -->
            <div class="focus-tip" id="focusTip">
                <i>"set a 25min timer and focus on one deep work task"</i>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <span>© 2026 FocusBuddy AI · study focus sessions</span>
            <span><a href="#">about</a> · <a href="#">privacy</a></span>
        </div>
    </footer>

    <script>
        (function() {
            // ---------- STUDY FOCUS TASKS (categories: deep work, quick review, breaks) ----------
            const STORAGE_KEY = 'focusbuddy_focus_tasks';

            const categories = ['🔥 Deep Work', '📖 Quick Review', '☕ Breaks'];

            const defaultTasks = [
                { cat: 0, text: 'write essay outline', done: false },
                { cat: 0, text: 'solve 5 physics problems', done: false },
                { cat: 0, text: 'read research paper', done: true },
                { cat: 1, text: 'review flashcards', done: false },
                { cat: 1, text: 'summarize chapter 3', done: false },
                { cat: 2, text: 'stretch break', done: false },
                { cat: 2, text: 'grab water', done: true },
                { cat: 2, text: '5min meditation', done: false },
                { cat: 1, text: 'practice vocabulary', done: false },
            ];

            let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (!tasks || !Array.isArray(tasks)) {
                tasks = defaultTasks;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            }

            function saveTasks() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ---------- TIMER LOGIC (Pomodoro style) ----------
            let timerInterval = null;
            let timeLeft = 25 * 60; // 25 minutes
            let timerRunning = false;
            const timerDisplay = document.getElementById('timer');
            const focusTip = document.getElementById('focusTip');

            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            function updateTimerDisplay() {
                timerDisplay.textContent = formatTime(timeLeft);
            }

            function startTimer() {
                if (timerRunning) return;
                timerRunning = true;
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();

                        // change tip based on time left (motivation)
                        if (timeLeft === 20 * 60) focusTip.innerHTML = '<i>"keep going, you\'re in flow"</i>';
                        else if (timeLeft === 10 * 60) focusTip.innerHTML = '<i>"more than halfway — stay locked"</i>';
                        else if (timeLeft === 5 * 60) focusTip.innerHTML = '<i>"last push, you got this"</i>';
                        else if (timeLeft === 0) {
                            focusTip.innerHTML = '<i>"session complete! take a break ✨"</i>';
                        }
                    } else {
                        // timer reached zero
                        clearInterval(timerInterval);
                        timerRunning = false;
                        focusTip.innerHTML = '<i>"great work! time for a break 🎉"</i>';
                    }
                }, 1000);
            }

            function pauseTimer() {
                clearInterval(timerInterval);
                timerRunning = false;
                focusTip.innerHTML = '<i>"paused — come back strong"</i>';
            }

            function resetTimer() {
                clearInterval(timerInterval);
                timerRunning = false;
                timeLeft = 25 * 60;
                updateTimerDisplay();
                focusTip.innerHTML = '<i>"fresh start — set intention for this session"</i>';
            }

            document.getElementById('startFocus').addEventListener('click', startTimer);
            document.getElementById('pauseFocus').addEventListener('click', pauseTimer);
            document.getElementById('resetFocus').addEventListener('click', resetTimer);

            // ---------- RENDER TASK CARDS (overlapping) ----------
            function render() {
                const grid = document.getElementById('focusGrid');
                if (!grid) return;

                let html = '';
                for (let c = 0; c < 3; c++) {
                    const catTasks = tasks.filter(t => t.cat === c);
                    html += `<div class="focus-card" data-cat="${c}">`;
                    html += `<div class="card-header">${categories[c]}</div>`;

                    html += `<ul class="task-list" id="cat-${c}-list">`;
                    catTasks.forEach((task, idx) => {
                        html += `<li class="${task.done ? 'completed' : ''}" data-cat="${c}" data-idx="${idx}">`;
                        html += `<input type="checkbox" class="task-check" ${task.done ? 'checked' : ''} data-cat="${c}" data-idx="${idx}">`;
                        html += `<span class="task-text">${escapeHtml(task.text)}</span>`;
                        html += `<button class="delete-task" data-cat="${c}" data-idx="${idx}">✕</button>`;
                        html += `</li>`;
                    });
                    html += `</ul>`;

                    // mini add form
                    html += `<div class="mini-add">`;
                    html += `<input type="text" class="mini-input" id="input-${c}" placeholder="add task...">`;
                    html += `<button class="mini-add-btn" data-cat="${c}">+</button>`;
                    html += `</div>`;
                    html += `</div>`;
                }

                grid.innerHTML = html;
                attachTaskEvents();
            }

            function attachTaskEvents() {
                // checkboxes
                document.querySelectorAll('.task-check').forEach(cb => {
                    cb.addEventListener('change', function(e) {
                        const cat = parseInt(this.dataset.cat);
                        const idx = parseInt(this.dataset.idx);
                        const catTasks = tasks.filter(t => t.cat === cat);
                        if (catTasks[idx]) {
                            const target = catTasks[idx];
                            tasks = tasks.map(t => {
                                if (t.cat === cat && t.text === target.text && t.done === target.done) {
                                    return { ...t, done: this.checked };
                                }
                                return t;
                            });
                            saveTasks();
                            render();
                        }
                    });
                });

                // delete
                document.querySelectorAll('.delete-task').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const cat = parseInt(this.dataset.cat);
                        const idx = parseInt(this.dataset.idx);
                        const catTasks = tasks.filter(t => t.cat === cat);
                        if (catTasks[idx]) {
                            const target = catTasks[idx];
                            tasks = tasks.filter(t => !(t.cat === cat && t.text === target.text && t.done === target.done));
                            saveTasks();
                            render();
                        }
                    });
                });

                // mini add buttons
                document.querySelectorAll('.mini-add-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const cat = parseInt(this.dataset.cat);
                        const input = document.getElementById(`input-${cat}`);
                        const newText = input.value.trim();
                        if (newText === '') return;
                        tasks.push({ cat, text: newText, done: false });
                        saveTasks();
                        render();
                    });
                });

                // enter in mini inputs
                document.querySelectorAll('.mini-input').forEach(inp => {
                    inp.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            const cat = inp.id.split('-')[1];
                            document.querySelector(`.mini-add-btn[data-cat="${cat}"]`)?.click();
                        }
                    });
                });
            }

            // initial render
            render();
            updateTimerDisplay();
        })();
    </script>
</body>
</html>
