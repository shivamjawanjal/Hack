<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusBuddy · schedule · overlapping precision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ecece7;  /* warm paper tone */
            color: #111;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ----- main container ----- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ----- NAVIGATION (crisp) ----- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2.5rem;
            background: #ffffff;
            border-bottom: 4px solid #111;
            flex-wrap: wrap;
            box-shadow: 0 8px 0 #111;
            margin-bottom: 0.8rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-decoration: none;
            color: #111;
            background: #fff;
            padding: 0.2rem 0;
        }

        .nav-links {
            display: flex;
            gap: 2.2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #111;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.3rem 0;
            border-bottom: 3px solid transparent;
        }

        .nav-links a:hover {
            border-bottom-color: #111;
        }

        .nav-links .active {
            border-bottom-color: #111;
        }

        .btn-nav {
            background: #111;
            color: #fff !important;
            padding: 0.6rem 2rem !important;
            border-radius: 50px;
            border: 2px solid #111;
        }

        .btn-nav:hover {
            background: transparent;
            color: #111 !important;
            border-bottom-color: #111 !important;
        }

        /* ----- page header ----- */
        .page-header {
            margin: 2.5rem 0 2rem;
        }

        .page-header h1 {
            font-size: 4.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            background: #111;
            color: #fff;
            display: inline-block;
            padding: 0.4rem 2rem 0.4rem 2rem;
            border-radius: 120px;
            border: 3px solid #111;
            box-shadow: 12px 12px 0 #888;
            margin-bottom: 1rem;
        }

        .page-desc {
            font-size: 1.5rem;
            border-left: 8px solid #111;
            padding-left: 2rem;
            color: #222;
            max-width: 800px;
        }

        /* ----- QUICK ADD (overlapping element) ----- */
        .quick-add-block {
            background: #fff;
            border: 3px solid #111;
            border-radius: 100px;
            padding: 1.8rem 2.2rem;
            box-shadow: 16px 16px 0 #111;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
            margin: 3rem 0 4rem;
            transform: rotate(-0.2deg);
            transition: 0.2s;
        }

        .quick-add-block:hover {
            transform: rotate(0deg) translate(-4px, -4px);
            box-shadow: 22px 22px 0 #111;
        }

        .quick-add-block select,
        .quick-add-block input {
            border: 3px solid #111;
            border-radius: 80px;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: #fff;
            font-weight: 500;
        }

        .quick-add-block select {
            min-width: 180px;
            cursor: pointer;
        }

        .quick-add-block input {
            flex: 2;
            min-width: 260px;
        }

        .quick-add-block button {
            background: #111;
            color: #fff;
            border: 3px solid #111;
            border-radius: 80px;
            padding: 1rem 3rem;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }

        .quick-add-block button:hover {
            background: #fff;
            color: #111;
        }

        /* ----- SCHEDULE GRID (overlapping cards) ----- */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1.2rem;
            margin: 3rem 0 5rem;
            align-items: start;
        }

        /* overlapping effect base */
        .day-card {
            background: #fff;
            border: 3px solid #111;
            border-radius: 45px;
            padding: 1.5rem 1rem 1.2rem;
            box-shadow: 10px 10px 0 #111;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            min-width: 0; /* avoid overflow */
            position: relative;
            z-index: 2;
        }

        /* overlapping magic: each card slightly overlaps next */
        .day-card:not(:first-child) {
            margin-left: -0.6rem;
        }

        .schedule-grid:hover .day-card {
            box-shadow: 8px 8px 0 #111;
        }

        .day-card:hover {
            transform: scale(1.02) translateY(-8px) translateX(-4px);
            box-shadow: 18px 18px 0 #111;
            z-index: 10;
            background: #fff;
        }

        .day-name {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            border-bottom: 4px solid #111;
            padding-bottom: 0.8rem;
            margin-bottom: 1.2rem;
            letter-spacing: -0.02em;
        }

        .task-list {
            list-style: none;
            margin-bottom: 1.2rem;
            max-height: 260px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #111 #ccc;
            padding-right: 4px;
        }

        .task-list li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.3rem;
            border-bottom: 1px dashed #aaa;
            font-size: 0.95rem;
        }

        .task-check {
            width: 20px;
            height: 20px;
            accent-color: #111;
            flex-shrink: 0;
            cursor: pointer;
            border: 2px solid #111;
        }

        .task-text {
            flex: 1;
            word-break: break-word;
            font-weight: 500;
        }

        .completed .task-text {
            text-decoration: line-through;
            color: #777;
        }

        .delete-task {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #aaa;
            padding: 0 4px;
            line-height: 1;
        }

        .delete-task:hover {
            color: #111;
            font-weight: 700;
        }

        .add-task-form {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .add-task-input {
            flex: 1;
            border: 3px solid #111;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            background: #fff;
            min-width: 0;
        }

        .add-task-btn {
            background: #111;
            color: #fff;
            border: 3px solid #111;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .add-task-btn:hover {
            background: #fff;
            color: #111;
        }

        /* ----- footer ----- */
        .footer {
            background: #111;
            color: #bbb;
            padding: 2.5rem 0;
            border-top: 5px solid #fff;
            margin-top: 4rem;
        }

        .footer .container {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px dotted #fff;
        }

        /* responsive */
        @media (max-width: 1000px) {
            .schedule-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .day-card:not(:first-child) {
                margin-left: 0; /* cancel overlap on smaller screens */
            }
        }

        @media (max-width: 700px) {
            .schedule-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .page-header h1 {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <!-- navigation -->


    <main>
        <div class="container">
           
            <!-- quick add row (overlaps visually) -->
            <div class="quick-add-block">
                <select id="daySelect">
                    <option value="0">Monday</option>
                    <option value="1">Tuesday</option>
                    <option value="2">Wednesday</option>
                    <option value="3">Thursday</option>
                    <option value="4">Friday</option>
                    <option value="5">Saturday</option>
                    <option value="6">Sunday</option>
                </select>
                <input type="text" id="taskInput" placeholder="e.g., read chapter 4">
                <button id="quickAddBtn">➕ Add task</button>
            </div>

            <!-- dynamic weekly grid injected by JS -->
            <div class="schedule-grid" id="scheduleGrid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <span>© 2026 FocusBuddy AI · schedule with overlapping precision</span>
            <span><a href="#">about</a> · <a href="#">privacy</a></span>
        </div>
    </footer>

    <script>
        (function() {
            // ---------- working schedule with localStorage ----------
            const STORAGE_KEY = 'focusbuddy_schedule_overlap';
            const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

            // default tasks (some variety)
            const defaultTasks = [
                { day: 0, text: 'plan weekly goals', done: false },
                { day: 0, text: 'math assignment', done: true },
                { day: 1, text: 'physics reading', done: false },
                { day: 2, text: 'group study', done: false },
                { day: 3, text: 'create flashcards', done: false },
                { day: 4, text: 'review notes', done: false },
                { day: 5, text: 'practice test', done: false },
                { day: 6, text: 'relax & reflect', done: false },
                { day: 1, text: 'AI coach session', done: false },
            ];

            // load or init
            let scheduleData = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (!scheduleData || !Array.isArray(scheduleData)) {
                scheduleData = defaultTasks;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(scheduleData));
            }

            function save() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(scheduleData));
            }

            // helper to escape (prevent XSS)
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // render the overlapping grid
            function render() {
                const grid = document.getElementById('scheduleGrid');
                if (!grid) return;

                let html = '';
                for (let d = 0; d < 7; d++) {
                    const dayTasks = scheduleData.filter(t => t.day === d);

                    html += `<div class="day-card" data-day="${d}">`;
                    html += `<div class="day-name">${dayNames[d]}</div>`;

                    html += `<ul class="task-list" id="day-${d}-list">`;
                    dayTasks.forEach((task, idx) => {
                        html += `<li class="${task.done ? 'completed' : ''}" data-day="${d}" data-task-idx="${idx}">`;
                        html += `<input type="checkbox" class="task-check" ${task.done ? 'checked' : ''} data-day="${d}" data-task-idx="${idx}">`;
                        html += `<span class="task-text">${escapeHtml(task.text)}</span>`;
                        html += `<button class="delete-task" data-day="${d}" data-task-idx="${idx}">✕</button>`;
                        html += `</li>`;
                    });
                    html += `</ul>`;

                    // mini add form inside card
                    html += `<div class="add-task-form">`;
                    html += `<input type="text" class="add-task-input" id="input-${d}" placeholder="new">`;
                    html += `<button class="add-task-btn" data-day="${d}">+</button>`;
                    html += `</div>`;
                    html += `</div>`;
                }

                grid.innerHTML = html;

                // re-attach events
                attachEvents();
            }

            function attachEvents() {
                // checkboxes
                document.querySelectorAll('.task-check').forEach(cb => {
                    cb.addEventListener('change', function(e) {
                        const day = parseInt(this.dataset.day);
                        const idx = parseInt(this.dataset.taskIdx);
                        const dayTasks = scheduleData.filter(t => t.day === day);
                        if (dayTasks[idx]) {
                            const target = dayTasks[idx];
                            // update by value (more robust: use text + done state)
                            scheduleData = scheduleData.map(t => {
                                if (t.day === day && t.text === target.text && t.done === target.done) {
                                    return { ...t, done: this.checked };
                                }
                                return t;
                            });
                            save();
                            render(); // re-render to refresh style
                        }
                    });
                });

                // delete buttons
                document.querySelectorAll('.delete-task').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const day = parseInt(this.dataset.day);
                        const idx = parseInt(this.dataset.taskIdx);
                        const dayTasks = scheduleData.filter(t => t.day === day);
                        if (dayTasks[idx]) {
                            const target = dayTasks[idx];
                            scheduleData = scheduleData.filter(t => !(t.day === day && t.text === target.text && t.done === target.done));
                            save();
                            render();
                        }
                    });
                });

                // add button inside each day card
                document.querySelectorAll('.add-task-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        const day = parseInt(this.dataset.day);
                        const input = document.getElementById(`input-${day}`);
                        const newText = input.value.trim();
                        if (newText === '') return;
                        scheduleData.push({ day, text: newText, done: false });
                        save();
                        render();
                    });
                });

                // quick add from top bar
                const quickBtn = document.getElementById('quickAddBtn');
                if (quickBtn) {
                    quickBtn.addEventListener('click', function() {
                        const daySelect = document.getElementById('daySelect');
                        const day = parseInt(daySelect.value);
                        const input = document.getElementById('taskInput');
                        const newText = input.value.trim();
                        if (newText === '') return;
                        scheduleData.push({ day, text: newText, done: false });
                        save();
                        render();
                        input.value = '';
                    });
                }

                // allow enter key in quick input
                const taskInput = document.getElementById('taskInput');
                if (taskInput) {
                    taskInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            document.getElementById('quickAddBtn')?.click();
                        }
                    });
                }
            }

            // initial render
            render();
        })();
    </script>
</body>
</html>
